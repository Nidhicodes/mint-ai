<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="mint" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow circle -->
  <circle cx="600" cy="280" r="250" fill="url(#glow)"/>

  <!-- Mint leaf icon (simplified) -->
  <g transform="translate(540, 160)">
    <path d="M60 0 C90 20, 110 60, 110 100 C110 140, 80 170, 60 180 C40 170, 10 140, 10 100 C10 60, 30 20, 60 0Z" fill="url(#mint)" opacity="0.9"/>
    <path d="M60 30 L60 150 M40 70 L60 90 M80 60 L60 80" stroke="#0a0a0a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#mint)">Mint AI</text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a1a1aa">Your personal AI app store</text>

  <!-- Subtle border -->
  <rect x="2" y="2" width="1196" height="626" rx="8" fill="none" stroke="#22c55e" stroke-opacity="0.15" stroke-width="2"/>
</svg>
